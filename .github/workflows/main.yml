name: YouBike Data Logger

on:
  schedule:
    # 這裡設定的是台灣時間 07:00 ~ 14:00 每整點執行一次
    # 對應 UTC 時間為前一天 23:00 到當天 06:00
    - cron: '*/5 23,0 * * *'
  workflow_dispatch: # 保留手動執行按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保程式有權限把 CSV 存回你的 GitHub
    steps:
      - name: 複製儲存庫內容
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 執行抓取程式
        run: python main.py

      - name: 將資料存回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.csv
          git commit -m "自動紀錄數據 [skip ci]" || exit 0
          git push
