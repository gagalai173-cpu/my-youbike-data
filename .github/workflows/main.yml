name: YouBike Data Logger

on:
  workflow_dispatch:  # 僅保留「手動執行」按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 複製儲存庫內容
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 執行抓取程式
        run: python main.py

      - name: 將資料存回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.csv
          git commit -m "Manual data fetch [skip ci]" || exit 0
          git push
