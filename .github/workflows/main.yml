name: YouBike Data Logger

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 直接在這裡宣告寫入權限，雙重保險
    steps:
      - name: 複製儲存庫內容
        uses: actions/checkout@v4 # 升級到 v4，解決警告問題

      - name: 設定 Python
        uses: actions/setup-python@v5 # 升級到 v5，解決警告問題
        with:
          python-version: '3.10'

      - name: 安裝必要工具
        run: pip install requests pandas

      - name: 執行抓取程式
        run: python main.py

      - name: 將資料存回 GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add youbike_log.csv
          git commit -m "Update YouBike data [skip ci]" || exit 0
          git push
